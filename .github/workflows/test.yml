name: Test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - '*'

env:
  TESTING: 1

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master
    - name: Install NPM dependencies
      run: npm ci
    - name: Run addons-linter
      run: 'npm run build && npm run pack && "./node_modules/.bin/addons-linter" target/xpi/firefox-latest.xpi' 

  test:
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        browser: [firefox, chrome]
        neovim: [stable, nightly]

    runs-on: ${{ matrix.os }}-latest

    steps:
    - name: Checkout
      uses: actions/checkout@master
    - name: Install ffmpeg (Linux)
      if: matrix.os == 'ubuntu'
      run: sudo apt update -y && sudo apt install -y ffmpeg
      timeout-minutes: 5
    - name: Install ffmpeg (macOS)
      if: matrix.os == 'macos'
      run: curl -JL https://evermeet.cx/ffmpeg/get/zip --output ffmpeg.zip && unzip ffmpeg.zip && echo "$PWD" >> $GITHUB_PATH
      timeout-minutes: 5
    - name: Install ffmpeg (Windows)
      if: matrix.os == 'windows'
      run: choco install ffmpeg
    - name: Install Neovim
      # Must happen before installing firefox, otherwise action-setup-vim might
      # modify $PATH in a way that will shadow the firefox binary we're
      # installing later on.
      uses: rhysd/action-setup-vim@v1.6.1
      with:
        neovim: true
        version: ${{ matrix.neovim }}
      timeout-minutes: 5
    - name: Install Geckodriver
      uses: browser-actions/setup-geckodriver@latest
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      timeout-minutes: 5
    - name: Install Firefox Dev Edition (Linux)
      if: matrix.browser == 'firefox' && matrix.os == 'ubuntu'
      run: |
        curl --output 'firefox.tar.xz' -L 'https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=linux64'
        tar -xvf firefox.tar.xz
        echo "$PWD/firefox" >> $GITHUB_PATH
      timeout-minutes: 5
    - name: Install Firefox Dev Edition (macOS)
      if: matrix.browser == 'firefox' && matrix.os == 'macos'
      run: |
        curl --output 'firefox.dmg' -L 'https://download.mozilla.org/?product=firefox-devedition-latest-ssl&os=osx'
        hdiutil attach firefox.dmg
        cp -R "/Volumes/Firefox Developer Edition/Firefox Developer Edition.app" /Applications/
        hdiutil detach "/Volumes/Firefox Developer Edition"
        echo "/Applications/Firefox Developer Edition.app/Contents/MacOS" >> $GITHUB_PATH
      timeout-minutes: 5
    - name: Install Firefox Dev Edition (Windows)
      if: matrix.browser == 'firefox' && matrix.os == 'windows'
      run: choco install firefox-dev --pre && choco install selenium-gecko-driver
      timeout-minutes: 5
    - name: Install Chrome (Linux)
      if: matrix.browser == 'chrome' && matrix.os == 'ubuntu'
      run: |
        JSON_URL="https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
        CHROME_URL=$(curl -fsSL "$JSON_URL" | jq -r '.channels.Stable.downloads.chrome[] | select(.platform=="linux64") | .url')
        DRIVER_URL=$(curl -fsSL "$JSON_URL" | jq -r '.channels.Stable.downloads.chromedriver[] | select(.platform=="linux64") | .url')
        curl -fsSL -o chrome.zip "$CHROME_URL"
        curl -fsSL -o chromedriver.zip "$DRIVER_URL"
        unzip -q chrome.zip
        unzip -q chromedriver.zip
        echo "$PWD/chrome-linux64" >> "$GITHUB_PATH"
        echo "$PWD/chromedriver-linux64" >> "$GITHUB_PATH"
      timeout-minutes: 5
    - name: Install Chrome (macOS)
      if: matrix.browser == 'chrome' && matrix.os == 'macos'
      run: |
        JSON_URL="https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
        if [ "$(uname -m)" = "arm64" ]; then
          PLATFORM="mac-arm64"
        else
          PLATFORM="mac-x64"
        fi
        CHROME_URL=$(curl -fsSL "$JSON_URL" | jq -r ".channels.Stable.downloads.chrome[] | select(.platform==\"$PLATFORM\") | .url")
        DRIVER_URL=$(curl -fsSL "$JSON_URL" | jq -r ".channels.Stable.downloads.chromedriver[] | select(.platform==\"$PLATFORM\") | .url")
        curl -fsSL -o chrome.zip "$CHROME_URL"
        curl -fsSL -o chromedriver.zip "$DRIVER_URL"
        unzip -q chrome.zip
        unzip -q chromedriver.zip
        echo "$PWD/chrome-$PLATFORM/Google Chrome for Testing.app/Contents/MacOS" >> "$GITHUB_PATH"
        echo "$PWD/chromedriver-$PLATFORM" >> "$GITHUB_PATH"
      timeout-minutes: 5
    - name: Install Chrome (Windows)
      if: matrix.browser == 'chrome' && matrix.os == 'windows'
      shell: pwsh
      run: |
        $json = Invoke-RestMethod -Uri "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
        $chromeUrl = ($json.channels.Stable.downloads.chrome | Where-Object { $_.platform -eq "win64" }).url
        $driverUrl = ($json.channels.Stable.downloads.chromedriver | Where-Object { $_.platform -eq "win64" }).url
        Invoke-WebRequest -Uri $chromeUrl -OutFile chrome.zip
        Invoke-WebRequest -Uri $driverUrl -OutFile chromedriver.zip
        Expand-Archive -Path chrome.zip -DestinationPath .
        Expand-Archive -Path chromedriver.zip -DestinationPath .
        Add-Content -Path $env:GITHUB_PATH -Value "$pwd\chrome-win64"
        Add-Content -Path $env:GITHUB_PATH -Value "$pwd\chromedriver-win64"
      timeout-minutes: 5
    - name: Install NPM dependencies
      timeout-minutes: 5
      run: npm ci
    - name: Build Firenvim
      timeout-minutes: 1
      run: npm run webpack -- --env=${{ matrix.browser }}-testing
    - name: Instrument Firenvim (Linux/Firefox/Stable only)
      if: matrix.os == 'ubuntu' && matrix.browser == 'firefox' && matrix.neovim == 'stable'
      run: npm run nyc -- instrument --in-place target/${{ matrix.browser }}
    - name: Pack Firenvim (Firefox)
      if: matrix.browser == 'firefox'
      run: npm run pack
    - name: Install Manifest
      run: npm run install_manifests
    - name: Test (Linux)
      timeout-minutes: 15
      if: matrix.os == 'ubuntu'
      # Multiple attempts to increase FPS to 60 have been made: use libx264,
      # using raw output... Nothing worked. Spending more effort on this will
      # only result in suffering and wasted time.
      run: xvfb-run --auto-servernum -s "-screen 0 920x690x24" sh -c '(sleep 3 && ffmpeg -loglevel error -t 240 -an -video_size 920x690 -framerate 30 -f x11grab -i $DISPLAY video.webm) & npm run jest -- ${{ matrix.browser }}'
    - name: Test (macOS)
      if: matrix.os == 'macos'
      timeout-minutes: 15
      run: |
        ffmpeg -loglevel warning -t 240 -framerate 30 -f avfoundation -i "0:0" video.webm &
        exit_code=0 && npm run jest -- ${{ matrix.browser }} || exit_code=$? && sleep 20 && exit $exit_code
    - name: Test (Windows)
      if: matrix.os == 'windows'
      timeout-minutes: 15
      run: |
        $ff = Start-Process -FilePath ffmpeg `
          -ArgumentList '-loglevel','info','-y','-framerate','30','-f','gdigrab','-i','desktop','-pix_fmt','yuv420p','video.webm' `
          -RedirectStandardError ffmpeg.log -PassThru
        try {
          npm run jest -- ${{ matrix.browser }}
        } finally {
          if (-not $ff.HasExited) { Stop-Process -Id $ff.Id -Force }
        }
    - name: Show ChromeDriver log (failure only)
      if: failure() && matrix.browser == 'chrome'
      shell: bash
      run: |
        if [ -f chromedriver.log ]; then
          echo "===== ChromeDriver log ====="
          cat chromedriver.log
          echo "===== End ChromeDriver log ====="
        else
          echo "No chromedriver.log found in $PWD"
        fi
    - name: Artifact upload (failure only)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ${{ matrix.os }}-${{ matrix.browser }}-${{ matrix.neovim }}
        path: |
          video.webm
          ffmpeg.log
          failures.txt
          chromedriver.log
        retention-days: 2
    - name: Process Coverage Report (Coverage only)
      uses: glacambre/action-compare-coverage@master
      if: matrix.os == 'ubuntu' && matrix.browser == 'firefox' && matrix.neovim == 'stable'
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
